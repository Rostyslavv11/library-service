services:
  web:
    build:
      context: .
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    environment:
      SQLITE_PATH: /app/data/db.sqlite3
      ALLOWED_HOSTS: 127.0.0.1,localhost
      DEBUG: "True"
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/data

volumes:
  sqlite_data:
